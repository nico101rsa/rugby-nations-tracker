name: Generate team digests

on:
  schedule:
    # Daily 20:00 UTC = 06:00 AEST (07:00 AEDT) — editions carry the new
    # Sydney-local date, ready before the morning check of the app.
    - cron: "0 20 * * *"
    # Match-Saturday extras: kickoffs run 05:10–19:10 UTC (FT ≈ 07:00–21:00),
    # so these land fresh post-match news ~1–2h after each cluster of games.
    - cron: "0 8,12,17,22 * * 6"
  workflow_dispatch:

# Own group. Sharing "refresh-data" with the match refresh meant every
# Saturday pinger dispatch evicted the QUEUED digest run (GitHub keeps one
# pending run per group), so match-day digests never ran. Push races with
# live-score commits are handled in the publish step instead.
concurrency:
  group: digests
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  digests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Unit tests
        run: node --test scripts/*.test.mjs

      - name: Generate 12 team editions (Gemini Flash + fact-check; Claude fallback)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ] && [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::notice::no model API key secret set — digest generation skipped"
            exit 0
          fi
          # SDK only needed on the Anthropic fallback path; Gemini uses fetch.
          if [ -z "$GEMINI_API_KEY" ]; then npm install --no-save @anthropic-ai/sdk; fi
          node scripts/generate-digests.mjs

      - name: Publish nations.json at site root
        run: cp public/nations.json nations.json

      # After the editions exist, not before — the email reports on the run.
      # Skips itself when RESEND_API_KEY is unset, and never fails the job: the
      # briefings are already written by this point and a mail problem must not
      # cost them.
      - name: Email the daily briefings
        continue-on-error: true
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          # Recipient is a SECRET, not a variable: this repo is public, so its
          # workflow logs are public, and a variable would put Nico's personal
          # address in them. As a secret, Actions masks it in any log output.
          DIGEST_EMAIL_TO: ${{ secrets.DIGEST_EMAIL_TO }}
          DIGEST_EMAIL_FROM: ${{ vars.DIGEST_EMAIL_FROM }}
        run: node scripts/email-digests.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nations.json public/nations.json editorial/
          git diff --cached --quiet && echo "No digest changes" && exit 0
          git commit -m "Daily digests $(TZ=Australia/Sydney date '+%F %H:%M AEST')"
          if git push; then exit 0; fi
          # A live-score commit raced us. Both sides rewrite nations.json
          # wholesale, so a rebase would conflict — instead rebuild on top of
          # origin: keep their fresh scores, re-apply our digests block and
          # editorial output (only digest runs write editorial/).
          cp public/nations.json /tmp/digests-ours.json
          # Snapshot only what THIS workflow authors. The news pool is written
          # hourly by harvest-news.yml, so restoring the whole editorial/ dir
          # wholesale would silently revert any harvest that landed during the
          # ~10 minutes this run spends on 12 model calls.
          rm -rf /tmp/editorial-ours && mkdir -p /tmp/editorial-ours
          cp -R editorial/reviews editorial/health editorial/runs /tmp/editorial-ours/ 2>/dev/null || true
          # storylines.json is authored HERE (the quiet-day backlog) and carries
          # the use counts. Omitting it from this snapshot would silently revert
          # the day's backlog update on any push race.
          cp editorial/editor-notes.md editorial/checker-notes.md editorial/storylines.json /tmp/editorial-ours/ 2>/dev/null || true
          git fetch origin main
          git reset --hard origin/main
          node -e '
            const fs = require("fs");
            const fresh = JSON.parse(fs.readFileSync("public/nations.json", "utf8"));
            const ours = JSON.parse(fs.readFileSync("/tmp/digests-ours.json", "utf8"));
            fresh.digests = ours.digests;
            const payload = JSON.stringify(fresh, null, 2);
            fs.writeFileSync("public/nations.json", payload);
            fs.writeFileSync("nations.json", payload);
          '
          # Copy our own output back over origin's tree, leaving origin's
          # news-pool.json (and anything else we do not author) intact.
          cp -R /tmp/editorial-ours/. editorial/
          git add nations.json public/nations.json editorial/
          git commit -m "Daily digests $(TZ=Australia/Sydney date '+%F %H:%M AEST') (reapplied over live refresh)"
          git push || (git pull --rebase --autostash && git push)
