name: Refresh match data

on:
  schedule:
    # Every 15 min. scripts/refresh.mjs decides per-run how much API budget to
    # spend from the fixture schedule (all UTC, matching the api-sports data):
    #   - LIVE  (match live/imminent): burst-polls in-process every ~12 min,
    #           publishing each fetch, for up to ~2h (one landed fire covers a
    #           whole match even when GitHub drops the next scheduled runs)
    #   - SWEEP (00/06/12/18 UTC):     today..+2, 3 API calls   -> news/fixtures
    #   - IDLE  (nothing on):          no API call at all
    # A budget guard refuses to spend the last ~10 requests. Stays under
    # api-sports' 100/day free tier; the burst is quota-tuned (~12-min cadence).
    - cron: "*/15 * * * *"
    # Denser Saturday match-window schedule (UTC): a Round's 6 matches run
    # ~05:10-19:10 UTC Sat, so more scheduled slots = more chances one lands to
    # latch a burst. The concurrency group below serialises overlaps.
    - cron: "*/10 4-21 * * 6"
  workflow_dispatch:

concurrency:
  group: refresh-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Schedule-aware refresh (live / sweep / idle)
        env:
          RUGBY_API_KEY: ${{ secrets.RUGBY_API_KEY }}
        run: node scripts/refresh.mjs

      - name: Publish nations.json at site root
        run: cp public/nations.json nations.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nations.json public/nations.json scripts/.cache-games.json scripts/match-tries.json
          git diff --cached --quiet && echo "No data changes" && exit 0
          git commit -m "Data refresh $(TZ=Australia/Sydney date '+%F %H:%M AEST')"
          git push
