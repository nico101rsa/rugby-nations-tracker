name: Refresh match data

on:
  schedule:
    # Every 15 min. scripts/refresh.mjs decides per-run how much API budget to
    # spend from the fixture schedule (all UTC, matching the api-sports data):
    #   - LIVE  (match live/imminent): today-only, 1 API call  -> ~15-min scores
    #   - SWEEP (00/06/12/18 UTC):     today..+2, 3 API calls   -> news/fixtures
    #   - IDLE  (nothing on):          no API call at all
    # A budget guard refuses to spend the last ~10 requests. Stays well under
    # api-sports' 100/day free tier (~76 on a match Saturday, ~12 when quiet).
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: refresh-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Schedule-aware refresh (live / sweep / idle)
        env:
          RUGBY_API_KEY: ${{ secrets.RUGBY_API_KEY }}
        run: node scripts/refresh.mjs

      - name: Publish nations.json at site root
        run: cp public/nations.json nations.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nations.json public/nations.json scripts/.cache-games.json scripts/match-tries.json
          git diff --cached --quiet && echo "No data changes" && exit 0
          git commit -m "Data refresh $(TZ=Australia/Sydney date '+%F %H:%M AEST')"
          git push
