name: Team events

# Each nation's recent internationals + upcoming fixtures across ALL
# competitions -> team-events.json. Daily at 01:00 UTC: ~25 SportsAPI Pro
# calls paced under the 10/min ceiling; with the stats harvest (~5-18 calls,
# 20:30 UTC, same key) the shared 100/day free tier stays well clear.
# (Saturday live polling is api-sports — a different vendor — so this job
# never competes with it.)
on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

# Own group on purpose — never share concurrency groups (see repo history).
concurrency:
  group: team-events-pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  team-events:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch team events from SportsAPI Pro
        env:
          SPORTSAPIPRO_KEY: ${{ secrets.SPORTSAPIPRO_KEY }}
        run: node scripts/fetch-team-events.mjs

      - name: Archive games into team-events-archive.json
        run: node scripts/archive-team-events.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add team-events.json team-events-archive.json
          git diff --cached --quiet && echo "No team-events changes" && exit 0
          git commit -m "Team events refresh $(TZ=Australia/Sydney date '+%F %H:%M AEST')"
          git push || (git pull --rebase --autostash && git push)
