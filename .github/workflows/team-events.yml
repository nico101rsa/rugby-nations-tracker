name: Team events

# Each nation's recent internationals + upcoming fixtures across ALL
# competitions -> team-events.json. Sundays only: 24 api-sports calls
# (12 teams x 2 seasons) must never compete with Saturday live polling
# on the shared ~100/day free tier.
on:
  schedule:
    - cron: "0 22 * * 0"
  workflow_dispatch:

# Own group on purpose — never share concurrency groups (see repo history).
concurrency:
  group: team-events-pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  team-events:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch team events from api-sports
        env:
          RUGBY_API_KEY: ${{ secrets.RUGBY_API_KEY }}
        run: node scripts/fetch-team-events.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add team-events.json
          git diff --cached --quiet && echo "No team-events changes" && exit 0
          git commit -m "Team events refresh $(TZ=Australia/Sydney date '+%F %H:%M AEST')"
          git push || (git pull --rebase --autostash && git push)
